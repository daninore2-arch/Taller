
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Consultas - EPM</title>
    <style>
        /* Paleta de colores corporativos */
        :root {
            --epm-green: #82C341;      /* Verde EPM */
            --epm-blue: #002B49;       /* Azul oscuro corporativo */
            --epm-light-blue: #00A4E4; /* Azul claro / acentos */
            --bg-color: #f4f7f6;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,43,73,0.1);
            border-top: 6px solid var(--epm-green);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: var(--epm-blue);
            margin: 0 0 10px 0;
            font-size: 1.8em;
        }

        .form-header p {
            color: #666;
            font-size: 0.95em;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--epm-blue);
            font-size: 0.95em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            font-size: 1em;
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #fcfcfc;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--epm-light-blue);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 164, 228, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--epm-green);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #72ab39; /* Verde ligeramente más oscuro */
        }

        .submit-btn:active {
            transform: translateY(1px);
        }
        
        /* Decoración sutil */
        .decoration-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--epm-blue) 0%, var(--epm-light-blue) 100%);
            margin-top: 30px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Buzón de Inquietudes</h2>
            <p>Por favor, ingresa tus datos para formular tu pregunta.</p>
        </div>
        
        <!-- Cambia el '#' por la URL o script de destino si vas a procesar los datos (ej. un Google Script o PHP) -->
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Jose Daniel Jurado">
            </div>

            <div class="form-group">
                <label for="dependencia">Empresa / Dependencia</label>
                <input type="text" id="dependencia" name="dependencia" required placeholder="Ej: Transmisión y Distribución">
            </div>

            <div class="form-group">
                <label for="pregunta">Pregunta o Inquietud</label>
                <textarea id="pregunta" name="pregunta" required placeholder="Redacta tu pregunta aquí..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Enviar Pregunta</button>
        </form>
        
        <div class="decoration-bar"></div>
    </div>

</body>
</html>
