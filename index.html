<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPM - Diagnóstico Núcleo Corporativo (REDO 2026)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600&display=swap');

:root{
  --navy:#001E50;--blue:#0050A0;--blue-l:#EBF3FC;--blue-d:#002F80;
  --green:#00A651;--green-l:#E8F7EF;--green-d:#007A3D;
  --amber:#D68000;--amber-l:#FEF3DC;
  --purple:#6B3FA0;--purple-l:#F2EAFD;
  --red:#C8332A;--red-l:#FDECEA;
  --bg:#EEF3FA;--card:#fff;--border:#D0DDF0;
  --t1:#001640;--t2:#3D5470;--t3:#8098B5;
  --sh:0 2px 14px rgba(0,30,80,.09);
  --sh-m:0 8px 36px rgba(0,30,80,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh}
.view{display:none}
.view.active{display:block}

/* HEADER */
.hdr{background:linear-gradient(128deg,#001440 0%,#003080 100%);padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 3px 20px rgba(0,0,0,.35)}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:#fff;letter-spacing:.3px}
.hdr-btn{background:rgba(0,166,81,.3);border:1px solid rgba(0,166,81,.5);color:#fff;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer}

/* LANDING & FORM */
.land-hero{background:linear-gradient(155deg,#001440 0%,#003080 50%,#0055A5 100%);padding:48px 18px 80px;text-align:center;position:relative}
.land-h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:32px;color:#fff;margin-bottom:12px}
.land-h1 em{color:#78CFB0;font-style:normal}
.land-form-card{background:#fff;border-radius:16px;padding:26px;max-width:450px;margin:0 auto;box-shadow:0 14px 55px rgba(0,0,0,.28);margin-top:-40px;position:relative;z-index:1}
.frow{margin-bottom:13px;text-align:left}
.flabel{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;margin-bottom:5px}
.finput,.fselect{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif}
.btn-start{width:100%;padding:13px;background:linear-gradient(135deg,#0050A0,#002F80);color:#fff;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;cursor:pointer;margin-top:10px}
.btn-start:disabled{opacity:0.5}

/* SURVEY DIMENSIONS */
.sv-wrap{max-width:670px;margin:0 auto;padding:18px}
.dim-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--sh);border-left:5px solid var(--dc)}
.dim-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.dim-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--t1)}
.dim-range-lbl{font-size:12px;color:var(--t3);font-weight:600}
.dim-input-wrap{display:flex;align-items:center;gap:15px}
.range-slider{flex:1;height:6px;accent-color:var(--dc);cursor:pointer}
.val-badge{width:50px;height:40px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--dc)}
.btn-submit{width:100%;padding:15px;background:linear-gradient(135deg,#00A651,#007A3D);color:#fff;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;cursor:pointer;margin-top:20px}

/* DASHBOARD */
.dash-wrap{max-width:800px;margin:0 auto;padding:18px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:15px;box-shadow:var(--sh);text-align:center}
.rtable{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
.rtable th, .rtable td{padding:12px;text-align:left;border-bottom:1px solid var(--bg)}
.rtable th{background:var(--blue-l);font-size:11px;text-transform:uppercase;color:var(--blue-d)}
</style>
</head>
<body>

<div id="app">
    <header class="hdr">
        <div class="hdr-brand">
            <div class="hdr-title">EPM REDO 2026</div>
        </div>
        <button class="hdr-btn" onclick="goToDashboard()">📊 Resultados</button>
    </header>

    <div id="vl" class="view active">
        <div class="land-hero">
            <h1 class="land-h1">Evaluación de Madurez<br><em>Núcleo Corporativo</em></h1>
        </div>
        <div class="land-form-card">
            <div class="frow">
                <label class="flabel">Nombre completo</label>
                <input class="finput" id="inp-name" type="text">
            </div>
            <div class="frow">
                <label class="flabel">Cargo</label>
                <input class="finput" id="inp-cargo" type="text">
            </div>
            <div class="frow">
                <label class="flabel">Unidad / Filial</label>
                <select class="fselect" id="inp-unidad">
                    <option value="">Seleccione...</option>
                    <option>EPM Corporativo</option>
                    <option>Afinia</option>
                    <option>Aguas Regionales</option>
                    <option>Filial Internacional</option>
                </select>
            </div>
            <button class="btn-start" onclick="startSurvey()">Comenzar Evaluación →</button>
        </div>
    </div>

    <div id="vs" class="view">
        <div class="sv-wrap">
            <div id="dim-inputs"></div>
            <button class="btn-submit" onclick="submitSurvey()">Sincronizar con REDO 2026 ✓</button>
        </div>
    </div>

    <div id="vd" class="view">
        <div class="dash-wrap">
            <div class="kpi-grid">
                <div class="kpi-card"><div class="flabel">Puntaje Grupal</div><div id="avg-total" style="font-size:28px; font-weight:700">0</div></div>
                <div class="kpi-card"><div class="flabel">Participantes</div><div id="total-resp" style="font-size:28px; font-weight:700">0</div></div>
            </div>
            <div class="card" id="dash-data" style="background:#fff; border-radius:12px; padding:20px; box-shadow:var(--sh)">
                <h3 style="margin-bottom:15px; font-family:'Barlow Condensed'">Registro Histórico</h3>
                <div id="table-container"></div>
            </div>
            <button class="btn-start" onclick="showView('vl')" style="margin-top:20px">Regresar</button>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmYgt-HCaQPnN4LUilyvz6CtDfqii6hkExQhnkLMVedvYk1MmDnn5bSY2CR9kAXATL/exec";

// CONFIGURACIÓN BASADA EN LA IMAGEN DE EPM
const DIMS = [
    { id: 1, name: 'Toma de Decisiones', min: 25, max: 60, color: '#0050A0' },
    { id: 2, name: 'Esfuerzos', min: 5, max: 12, color: '#00A651' },
    { id: 3, name: 'Visión', min: 30, max: 120, color: '#6B3FA0' },
    { id: 4, name: 'Despliegue', min: 3, max: 36, color: '#D68000' }
];

let currentUser = {};

function showView(id){
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startSurvey(){
    currentUser = {
        name: document.getElementById('inp-name').value,
        cargo: document.getElementById('inp-cargo').value,
        unidad: document.getElementById('inp-unidad').value
    };
    if(!currentUser.name) return alert("Completa los datos");
    
    const container = document.getElementById('dim-inputs');
    container.innerHTML = DIMS.map(d => `
        <div class="dim-card" style="--dc: ${d.color}">
            <div class="dim-info">
                <span class="dim-name">${d.name}</span>
                <span class="dim-range-lbl">Rango: ${d.min} - ${d.max}</span>
            </div>
            <div class="dim-input-wrap">
                <input type="range" class="range-slider" min="${d.min}" max="${d.max}" value="${d.min}" 
                       oninput="document.getElementById('val-${d.id}').innerText = this.value">
                <div class="val-badge" id="val-${d.id}">${d.min}</div>
            </div>
        </div>
    `).join('');
    
    showView('vs');
}

async function submitSurvey(){
    const scores = DIMS.map(d => parseInt(document.querySelector(`input[min="${d.min}"]`).value));
    const total = scores.reduce((a,b) => a + b, 0);

    const payload = {
        name: currentUser.name,
        cargo: currentUser.cargo,
        unidad: currentUser.unidad,
        dimScores: scores,
        total: total
    };

    try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("¡Datos guardados con éxito!");
        goToDashboard();
    } catch(e) { alert("Error al guardar"); }
}

async function goToDashboard(){
    showView('vd');
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    
    document.getElementById('total-resp').innerText = data.length;
    const avg = data.reduce((s, r) => s + parseFloat(r.total), 0) / data.length;
    document.getElementById('avg-total').innerText = avg.toFixed(1);

    let html = `<table class="rtable"><thead><tr><th>Participante</th><th>Total</th><th>Fecha</th></tr></thead><tbody>`;
    data.reverse().forEach(r => {
        html += `<tr>
            <td><strong>${r.nombre}</strong><br><small>${r.unidad}</small></td>
            <td><span style="font-weight:700; color:var(--blue)">${r.total}</span></td>
            <td>${new Date(r.fecha).toLocaleDateString()}</td>
        </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('table-container').innerHTML = html;
}
</script>
</body>
</html>
